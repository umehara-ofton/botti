<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ダッシュボード</title>
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet"

    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<div class="container">
<aside class="sidebar">
<div class="logo">
<small>就活管理</small>
<h2>CareerAdmin</h2>
</div>
<button class="menu active">
<i class="fa-solid fa-table-cells-large"></i>

            トップ
</button>
<button class="menu">
<i class="fa-solid fa-users"></i>

            学生情報
</button>
<button class="menu">
<i class="fa-solid fa-building"></i>

            企業管理
</button>
<button class="menu">
<i class="fa-solid fa-briefcase"></i>

            就職活動管理
</button>
<button class="logout">
<i class="fa-solid fa-right-from-bracket"></i>

            ログアウト
</button>

<script>
    document.querySelector('.logout').addEventListener('click', function () {
    window.location.href = 'index.html';
    });
</script>


</aside>
<main class="main">
<header>
<h3>ダッシュボード</h3>
</header>
<section class="title">
<h1>ダッシュボード</h1>
<p>2026年度 就職支援管理システム</p>
</section>
<div class="cards">
<button class="card">
<div class="icon">
<i class="fa-solid fa-users"></i>
</div>
<h2>142 <span>名</span></h2>
<h4>学生情報一覧</h4>
<p>登録学生の一覧・詳細確認・編集</p>
</button>
<button class="card">
<div class="icon">
<i class="fa-solid fa-building"></i>
</div>
<h2>38 <span>社</span></h2>
<h4>企業管理</h4>
<p>求人企業の登録・情報管理</p>
</button>
<button class="card">
<div class="icon">
<i class="fa-solid fa-briefcase"></i>
</div>
<h2>97 <span>件</span></h2>
<h4>就職活動管理</h4>
<p>学生の活動状況・選考状況を管理</p>
</button>
<button class="card">
<div class="icon">
<i class="fa-solid fa-graduation-cap"></i>
</div>
<h2>26 <span>件</span></h2>
<h4>就職指導一覧</h4>
<p>指導記録・面談内容の確認</p>
</button>
</div>
</main>
</div>
</body>
</html>
